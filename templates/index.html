<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>SplitVision Web</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="form-container">
        <h1>SplitVision Web</h1>
        <form id="uploadForm" enctype="multipart/form-data">
            <!-- Área de upload -->
            <div class="upload-area">
                <p>Arraste e solte o PDF aqui</p>
                <p>ou</p>
                <button type="button" class="upload-btn" onclick="document.getElementById('pdf').click()">Escolher
                    Arquivo</button>
                <input type="file" id="pdf" name="pdf" accept="application/pdf" required>
            </div>

            <!-- Preview do arquivo (oculto inicialmente) -->
            <p id="file-name" class="file-highlight" style="display:none;"></p>


            <!-- Barra de progresso (oculta inicialmente) -->
            <div id="progress-container" style="display:none;">
                <div class="progress-bar">
                    <div class="progress" id="progress">0%</div>
                </div>
            </div>

            <!-- Botão processar -->
            <button type="submit">Separar e Renomear</button>
        </form>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>


</body>
<footer class="footer">
    <p>Todos os Direitos Reservados - Desenvolvido Por <strong>Tonivan Joseph</strong></p>
</footer>

</html>
